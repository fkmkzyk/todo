<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOアプリ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <h1>TODO</h1>
    <p class="status" id="status-message"></p>
    <form class="form" id="todo-form">
      <input id="todo-input" type="text" placeholder="タスクを入力" autocomplete="off">
      <button class="add-button" type="submit">追加</button>
    </form>
    <ul id="todo-list"></ul>
    <p class="empty" id="empty-message">まだタスクがありません</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
